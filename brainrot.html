<!DOCTYPE html>
<html>
<head>
  <title>Brainrotmon Italia</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(#f7efe2, #ffd6a5);
      text-align: center;
    }

    #game {
      max-width: 750px;
      margin: 25px auto;
      background: white;
      padding: 20px;
      border-radius: 18px;
      box-shadow: 0 0 25px #0003;
    }

    #stats {
      display: flex;
      justify-content: space-around;
      background: #eee;
      padding: 10px;
      border-radius: 12px;
      margin-bottom: 15px;
      flex-wrap: wrap;
      gap: 8px;
    }

    #map {
      display: grid;
      grid-template-columns: repeat(7, 55px);
      gap: 5px;
      justify-content: center;
      margin: 20px;
    }

    .tile {
      width: 55px;
      height: 55px;
      background: #a8e6a3;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 25px;
    }

    .player {
      background: #ffd166;
      border: 3px solid #ef476f;
    }

    button {
      margin: 5px;
      padding: 10px 14px;
      border: none;
      border-radius: 10px;
      background: #ef476f;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #d43d61;
    }

    #battle, #shop, #collectionBox {
      background: #f3f3f3;
      border-radius: 14px;
      padding: 12px;
      margin-top: 12px;
    }

    #battleView {
      font-size: 70px;
      background: linear-gradient(#dff6ff, #fff3b0);
      border-radius: 18px;
      padding: 25px;
      margin: 15px auto;
      max-width: 420px;
      border: 4px solid #222;
    }

    #log {
      min-height: 70px;
      background: #222;
      color: white;
      border-radius: 10px;
      padding: 12px;
      margin-top: 15px;
    }

    .hidden {
      display: none;
    }

    .hpbar {
      width: 200px;
      height: 16px;
      background: #ccc;
      border-radius: 10px;
      margin: 8px auto;
      overflow: hidden;
    }

    .hpfill {
      height: 100%;
      background: #06d6a0;
      width: 100%;
    }
  </style>
</head>

<body>
  <div id="game">
    <h1>🇮🇹 Brainrotmon Italia</h1>
    <p>Explore your real-world region. Battle. Catch. Level up.</p>

    <div id="stats">
      <div>❤️ HP: <span id="playerHp">60</span></div>
      <div>⭐ Level: <span id="level">1</span></div>
      <div>✨ XP: <span id="xp">0</span></div>
      <div>🟡 Cannoli Balls: <span id="balls">5</span></div>
      <div>📍 Region: <span id="region">Unknown</span></div>
    </div>

    <div id="map"></div>

    <div id="controls">
      <button onclick="move('up')">⬆️</button><br>
      <button onclick="move('left')">⬅️</button>
      <button onclick="move('down')">⬇️</button>
      <button onclick="move('right')">➡️</button>
    </div>

    <button onclick="askLocation()">📍 Use My Location</button>
    <button onclick="startLiveLocation()">🛰️ Live Tracking</button>
    <button onclick="openShop()">🛒 Shop</button>
    <button onclick="toggleCollection()">📘 Collection</button>
    <button onclick="saveGame()">💾 Save</button>
    <button onclick="resetGame()">🗑️ Reset</button>

    <div id="battle" class="hidden">
      <div id="battleView">
        <div>🧍 VS <span id="battleEmoji">❓</span></div>
      </div>

      <h2 id="enemyName"></h2>
      <div class="hpbar">
        <div id="enemyHpBar" class="hpfill"></div>
      </div>
      <p id="enemyHp"></p>

      <button onclick="attack('slap')">🤌 Pasta Slap</button>
      <button onclick="attack('espresso')">☕ Espresso Blast</button>
      <button onclick="catchMonster()">Throw Cannoli Ball</button>
      <button onclick="run()">Run</button>
    </div>

    <div id="shop" class="hidden">
      <h3>🛒 Nonna’s Shop</h3>
      <button onclick="buyBall()">Buy Cannoli Ball — 10 XP</button>
      <button onclick="heal()">Eat Pizza — Heal 20 HP for 15 XP</button>
    </div>

    <div id="collectionBox" class="hidden">
      <h3>Your Brainrotmon</h3>
      <p id="collection">None yet.</p>
    </div>

    <div id="log">Click “Use My Location” or walk around to find a Brainrotmon.</div>
  </div>

  <script>
    const monsters = [
      { name: "Bombardiro Crocodilo", hp: 35, emoji: "🐊", rarity: "Rare" },
      { name: "Tralalero Tralala", hp: 28, emoji: "🦈", rarity: "Common" },
      { name: "Tung Tung Tung Sahur", hp: 40, emoji: "🥁", rarity: "Rare" },
      { name: "Ballerina Cappuccina", hp: 25, emoji: "☕", rarity: "Common" },
      { name: "Lirili Larila", hp: 30, emoji: "🦘", rarity: "Common" },
      { name: "Chimpanzini Bananini", hp: 32, emoji: "🍌", rarity: "Common" },
      { name: "Brr Brr Patapim", hp: 45, emoji: "🌲", rarity: "Legendary" },
      { name: "Frigo Camelo", hp: 38, emoji: "🐫", rarity: "Rare" }
    ];

    let player = {
      x: 3,
      y: 3,
      hp: 60,
      maxHp: 60,
      level: 1,
      xp: 0,
      balls: 5
    };

    let currentEnemy = null;
    let currentEnemyMaxHp = 0;
    let collection = [];
    let userLocation = null;
    let liveWatchId = null;

    function askLocation() {
      if (!navigator.geolocation) {
        log("Your browser does not support location.");
        return;
      }

      log("Asking for location permission...");

      navigator.geolocation.getCurrentPosition(
        function(position) {
          userLocation = {
            lat: position.coords.latitude,
            lon: position.coords.longitude
          };

          const region = getRegionFromLocation(userLocation.lat, userLocation.lon);
          document.getElementById("region").textContent = region;
          log(`Location approved! You are in the ${region}.`);
          drawMap();
        },
        function() {
          log("Location permission denied or unavailable.");
        }
      );
    }

    function startLiveLocation() {
      if (!navigator.geolocation) {
        log("Your browser does not support live location.");
        return;
      }

      if (liveWatchId !== null) {
        log("Live tracking is already on.");
        return;
      }

      log("Starting live tracking...");

      liveWatchId = navigator.geolocation.watchPosition(
        function(position) {
          userLocation = {
            lat: position.coords.latitude,
            lon: position.coords.longitude
          };

          const region = getRegionFromLocation(userLocation.lat, userLocation.lon);
          document.getElementById("region").textContent = region;
          log(`Live location updated: ${region}.`);
        },
        function() {
          log("Could not track location.");
        },
        {
          enableHighAccuracy: true,
          maximumAge: 10000,
          timeout: 10000
        }
      );
    }

    function getRegionFromLocation(lat, lon) {
      if (lat > 32 && lat < 37 && lon < -110) return "Desert Cannoli Plains";
      if (lat > 40 && lon < -70 && lon > -90) return "East Coast Espresso Zone";
      if (lat > 25 && lat < 37 && lon > -100 && lon < -80) return "Southern Spaghetti Swamp";
      if (lat > 37 && lat < 50 && lon < -100) return "Northern Parmesan Tundra";
      if (lat > 32 && lat < 42 && lon > -125 && lon < -114) return "West Coast Mozzarella Coast";
      return "Mystery Mozzarella Region";
    }

    function getScenery() {
      const region = userLocation
        ? getRegionFromLocation(userLocation.lat, userLocation.lon)
        : "Default";

      if (region.includes("Desert")) return ["🌵", "🏜️", "☀️", "🪨", "🍕"];
      if (region.includes("East Coast")) return ["🏙️", "🌊", "☕", "🌳", "🍝"];
      if (region.includes("Southern")) return ["🌾", "🐊", "🌿", "🍝", "🍕"];
      if (region.includes("Northern")) return ["❄️", "🌲", "🧀", "🏔️", "🌨️"];
      if (region.includes("West Coast")) return ["🌴", "🌊", "☀️", "🍋", "🍕"];

      return ["🌿", "🌲", "🍝", "🍕", "🌻"];
    }

    function drawMap() {
      const map = document.getElementById("map");
      map.innerHTML = "";

      const scenery = getScenery();

      for (let y = 0; y < 7; y++) {
        for (let x = 0; x < 7; x++) {
          const tile = document.createElement("div");
          tile.className = "tile";

          if (player.x === x && player.y === y) {
            tile.classList.add("player");
            tile.textContent = "🧍";
          } else {
            tile.textContent = scenery[Math.floor(Math.random() * scenery.length)];
          }

          map.appendChild(tile);
        }
      }
    }

    function move(direction) {
      if (currentEnemy) return;

      if (direction === "up" && player.y > 0) player.y--;
      if (direction === "down" && player.y < 6) player.y++;
      if (direction === "left" && player.x > 0) player.x--;
      if (direction === "right" && player.x < 6) player.x++;

      drawMap();

      if (Math.random() < 0.38) {
        startBattle();
      } else {
        if (userLocation) {
          log(`You explore the ${getRegionFromLocation(userLocation.lat, userLocation.lon)}...`);
        } else {
          log("You wander through the pasta fields...");
        }
      }
    }

    function chooseMonster() {
      const roll = Math.random();

      if (roll < 0.08) {
        return monsters.find(m => m.rarity === "Legendary");
      }

      if (roll < 0.32) {
        const rares = monsters.filter(m => m.rarity === "Rare");
        return rares[Math.floor(Math.random() * rares.length)];
      }

      const commons = monsters.filter(m => m.rarity === "Common");
      return commons[Math.floor(Math.random() * commons.length)];
    }

    function startBattle() {
      const monster = chooseMonster();
      currentEnemy = { ...monster };
      currentEnemyMaxHp = currentEnemy.hp;

      document.getElementById("map").style.display = "none";
      document.getElementById("controls").style.display = "none";
      document.getElementById("battle").classList.remove("hidden");
      document.getElementById("shop").classList.add("hidden");

      updateBattle();
      log(`A wild ${currentEnemy.emoji} ${currentEnemy.name} appeared! Rarity: ${currentEnemy.rarity}`);
    }

    function attack(type) {
      let damage;

      if (type === "slap") {
        damage = Math.floor(Math.random() * 10) + 6 + player.level;
      } else {
        damage = Math.floor(Math.random() * 15) + 4 + player.level;
      }

      currentEnemy.hp -= damage;

      if (currentEnemy.hp <= 0) {
        gainXp(20);
        log(`You defeated ${currentEnemy.name}! You gained 20 XP.`);
        endBattle();
      } else {
        enemyAttack();
        updateBattle();
        log(`You used ${type === "slap" ? "Pasta Slap" : "Espresso Blast"} and dealt ${damage} damage!`);
      }
    }

    function enemyAttack() {
      const damage = Math.floor(Math.random() * 8) + 3;
      player.hp -= damage;

      if (player.hp <= 0) {
        player.hp = player.maxHp;
        player.x = 3;
        player.y = 3;
        log("You fainted from too much brainrot. Nonna healed you.");
        endBattle();
        drawMap();
      }

      updateStats();
    }

    function catchMonster() {
      if (player.balls <= 0) {
        log("You have no Cannoli Balls left!");
        return;
      }

      player.balls--;

      let chance = 0.25;

      if (currentEnemy.hp < currentEnemyMaxHp / 2) chance += 0.25;
      if (currentEnemy.hp < currentEnemyMaxHp / 4) chance += 0.25;
      if (currentEnemy.rarity === "Rare") chance -= 0.1;
      if (currentEnemy.rarity === "Legendary") chance -= 0.25;

      if (Math.random() < chance) {
        collection.push(currentEnemy);
        gainXp(15);
        log(`You caught ${currentEnemy.name}! +15 XP.`);
        updateCollection();
        endBattle();
      } else {
        enemyAttack();
        log(`${currentEnemy.name} escaped the Cannoli Ball!`);
      }

      updateStats();
    }

    function gainXp(amount) {
      player.xp += amount;

      if (player.xp >= player.level * 50) {
        player.xp = 0;
        player.level++;
        player.maxHp += 10;
        player.hp = player.maxHp;
        log(`LEVEL UP! You are now level ${player.level}.`);
      }

      updateStats();
    }

    function run() {
      log("You ran away dramatically like an Italian soap opera.");
      endBattle();
    }

    function endBattle() {
      currentEnemy = null;
      document.getElementById("battle").classList.add("hidden");
      document.getElementById("map").style.display = "grid";
      document.getElementById("controls").style.display = "block";
      updateStats();
      drawMap();
    }

    function openShop() {
      document.getElementById("shop").classList.toggle("hidden");
    }

    function buyBall() {
      if (player.xp >= 10) {
        player.xp -= 10;
        player.balls++;
        log("You bought one Cannoli Ball.");
      } else {
        log("Not enough XP.");
      }

      updateStats();
    }

    function heal() {
      if (player.xp >= 15) {
        player.xp -= 15;
        player.hp = Math.min(player.maxHp, player.hp + 20);
        log("You ate pizza and healed 20 HP.");
      } else {
        log("Not enough XP.");
      }

      updateStats();
    }

    function toggleCollection() {
      document.getElementById("collectionBox").classList.toggle("hidden");
      updateCollection();
    }

    function updateStats() {
      document.getElementById("playerHp").textContent = player.hp;
      document.getElementById("level").textContent = player.level;
      document.getElementById("xp").textContent = player.xp;
      document.getElementById("balls").textContent = player.balls;
    }

    function updateBattle() {
      document.getElementById("enemyName").textContent =
        `${currentEnemy.emoji} ${currentEnemy.name}`;

      document.getElementById("battleEmoji").textContent = currentEnemy.emoji;

      document.getElementById("enemyHp").textContent =
        `HP: ${Math.max(currentEnemy.hp, 0)} / ${currentEnemyMaxHp}`;

      const percent = Math.max((currentEnemy.hp / currentEnemyMaxHp) * 100, 0);
      document.getElementById("enemyHpBar").style.width = percent + "%";
    }

    function updateCollection() {
      document.getElementById("collection").innerHTML =
        collection.length
          ? collection.map(m => `${m.emoji} ${m.name} — ${m.rarity}`).join("<br>")
          : "None yet.";
    }

    function saveGame() {
      localStorage.setItem("brainrotmonSave", JSON.stringify({
        player,
        collection,
        userLocation
      }));

      log("Game saved!");
    }

    function loadGame() {
      const save = localStorage.getItem("brainrotmonSave");

      if (save) {
        const data = JSON.parse(save);
        player = data.player;
        collection = data.collection || [];
        userLocation = data.userLocation || null;

        if (userLocation) {
          document.getElementById("region").textContent =
            getRegionFromLocation(userLocation.lat, userLocation.lon);
        }

        log("Loaded saved game.");
      }

      updateStats();
      updateCollection();
      drawMap();
    }

    function resetGame() {
      localStorage.removeItem("brainrotmonSave");
      location.reload();
    }

    function log(message) {
      document.getElementById("log").textContent = message;
    }

    loadGame();
  </script>
</body>
</html>
